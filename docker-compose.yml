version: '3.8'

services:
  # FastAPI Application
  web:
    build: .
    container_name: auth-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./auth.db
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DEBUG=False
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:8000}
    depends_on: []
    restart: unless-stopped
    volumes:
      - ./:/app
      - ./auth.db:/app/auth.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - auth-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: auth-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - auth-network

networks:
  auth-network:
    driver: bridge

